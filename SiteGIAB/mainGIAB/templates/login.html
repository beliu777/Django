{% load static %}
<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Вход — GIA B</title><style>
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;background:#0d1b2a;background-image:linear-gradient(135deg,rgba(65,90,119,.9),rgba(13,27,42,.96)),radial-gradient(circle at top left,#95d5b2,transparent 32%)}.card{width:min(430px,100%);background:#f7f4ed;border-radius:30px;box-shadow:0 28px 70px rgba(0,0,0,.35);overflow:hidden}.top{padding:34px;background:#1b4332;color:#f8fff9}.top .mark{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#b7e4c7;font-weight:900}.top h1{font-size:30px;margin:12px 0 8px}.top p{color:#d8f3dc}.body{padding:30px}.message{padding:12px 14px;border-radius:14px;background:#fff3cd;color:#5f4500;margin-bottom:14px}.form-group{margin-bottom:16px}label{display:block;font-size:13px;color:#40534a;font-weight:800;margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}input{width:100%;border:1px solid #d6ded8;background:#fff;border-radius:14px;padding:13px 14px;font-size:15px}input:focus{outline:3px solid #b7e4c7;border-color:#52b788}.btn{width:100%;border:0;border-radius:16px;padding:14px 18px;background:#2d6a4f;color:#fff;font-weight:900;font-size:16px;cursor:pointer;margin-top:6px}.btn:hover{background:#1b4332}.switch{text-align:center;color:#6b756e;margin-top:18px}.switch a{color:#1d3557;font-weight:900;text-decoration:none}.helptext,li{font-size:12px;color:#6b756e;margin-top:5px}ul{list-style:none}
</style></head><body><div class="card"><div class="top"><div class="mark">GIA B</div><h1>Вход</h1><p>Авторизация в системе документов.</p></div><div class="body">{% if messages %}{% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}{% endif %}<form method="post">{% csrf_token %}<div class="form-group"><label>Логин</label>{{ form.username }}</div><div class="form-group"><label>Пароль</label>{{ form.password }}</div><button class="btn" type="submit">Войти</button></form><div class="switch">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></div></div></div></body></html>
